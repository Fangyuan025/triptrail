<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TripTrail — Travel Map Animations</title>
<link href="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.css" rel="stylesheet" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">
  <!-- ====================== SIDEBAR ====================== -->
  <aside id="sidebar">
    <header class="brand">
      <svg class="logo" viewBox="0 0 24 24" width="30" height="30" aria-hidden="true">
        <circle cx="6.2" cy="17.8" r="2.7" fill="var(--accent)"/>
        <circle cx="17.8" cy="6.2" r="2.7" fill="none" stroke="var(--accent)" stroke-width="1.8"/>
        <path d="M8.6 16.2 C13.6 13.8 10.4 10.2 15.4 7.8" fill="none" stroke="#e6edf3" stroke-width="1.8" stroke-dasharray="2.4 2.6" stroke-linecap="round"/>
      </svg>
      <div class="brand-text">
        <h1>TripTrail</h1>
        <span class="tag">travel map animations</span>
      </div>
      <button id="nav-close" class="nav-close" aria-label="Close panel">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6 18 18 M18 6 6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </header>

    <div class="scroll">
      <!-- Title / subtitle -->
      <section class="panel">
        <h2>Story</h2>
        <label class="field">
          <span>Title</span>
          <input id="inp-title" type="text" placeholder="My European Adventure" value="My European Adventure" />
        </label>
        <label class="field">
          <span>Subtitle</span>
          <input id="inp-subtitle" type="text" placeholder="Spring 2026 · 5 cities" value="Spring 2026 · 5 cities" />
        </label>
      </section>

      <!-- Stops -->
      <section class="panel">
        <h2>Stops <span id="stop-count" class="pill">0</span></h2>
        <div class="search">
          <input id="inp-search" type="text" placeholder="Search a city, e.g. Tokyo…" autocomplete="off" />
          <button id="btn-add" class="btn btn-accent">Add</button>
          <div id="search-results" class="results hidden"></div>
        </div>
        <p class="hint">…or click anywhere on the map to drop a stop. Use the camera button to attach a photo.</p>
        <ol id="stops" class="stops"></ol>
        <button id="btn-clear" class="btn btn-ghost small">Clear all</button>
      </section>

      <!-- Route builder / import -->
      <section class="panel">
        <h2>Build route</h2>
        <label class="field">
          <span>Describe your trip <em>(replaces current stops)</em></span>
          <textarea id="inp-trip" rows="3" placeholder="Lisbon to Madrid by train, then Barcelona by car&#10;or: 东京 → 大阪 by train → 京都"></textarea>
        </label>
        <div class="btnrow">
          <button id="btn-build" class="btn btn-accent small">
            <svg class="ic" viewBox="0 0 24 24"><path d="M12 3 13.8 9.2 20 11 13.8 12.8 12 19 10.2 12.8 4 11 10.2 9.2 Z" fill="currentColor"/><path d="M18.5 3.2 19.2 5.5 21.5 6.2 19.2 6.9 18.5 9.2 17.8 6.9 15.5 6.2 17.8 5.5 Z" fill="currentColor"/></svg>
            Build from text
          </button>
          <button id="btn-import" class="btn btn-ghost small">
            <svg class="ic" viewBox="0 0 24 24"><path d="M3 6.5 A1.5 1.5 0 0 1 4.5 5 H9 l2 2.5 h8.5 A1.5 1.5 0 0 1 21 9 V17.5 A1.5 1.5 0 0 1 19.5 19 H4.5 A1.5 1.5 0 0 1 3 17.5 Z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
            GPX / KML / GeoJSON
          </button>
        </div>
      </section>

      <!-- Look & feel -->
      <section class="panel">
        <h2>Look</h2>
        <label class="field">
          <span>Map style</span>
          <select id="sel-style">
            <option value="https://tiles.versatiles.org/assets/styles/eclipse/style.json">Eclipse — dark &amp; colorful</option>
            <option value="https://tiles.openfreemap.org/styles/liberty">Liberty — classic color</option>
            <option value="https://tiles.openfreemap.org/styles/fiord">Fiord — deep blue</option>
            <option value="https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json">Dark Matter — minimal dark</option>
            <option value="https://tiles.openfreemap.org/styles/bright">Bright</option>
            <option value="https://tiles.openfreemap.org/styles/positron">Positron — light minimal</option>
          </select>
        </label>
        <label class="field">
          <span>Aspect ratio</span>
          <select id="sel-aspect">
            <option value="16:9">16:9 — YouTube / landscape</option>
            <option value="9:16">9:16 — Reels / TikTok / Shorts</option>
            <option value="1:1">1:1 — Square</option>
            <option value="4:5">4:5 — Instagram portrait</option>
          </select>
        </label>
        <label class="field">
          <span>Accent color</span>
          <input id="inp-accent" type="color" value="#ff5a3c" />
        </label>
        <div class="row">
          <label class="check"><input id="chk-globe" type="checkbox" /> Globe view</label>
          <label class="check"><input id="chk-pitch" type="checkbox" /> 3D tilt</label>
        </div>
        <div class="row">
          <label class="check"><input id="chk-labels" type="checkbox" checked /> City labels</label>
          <label class="check"><input id="chk-roads" type="checkbox" checked /> Real routes</label>
          <label class="check"><input id="chk-glow" type="checkbox" checked /> Glow</label>
        </div>
        <label class="field">
          <span>Pace <em id="pace-val">Normal</em></span>
          <input id="rng-pace" type="range" min="0.4" max="2.2" step="0.1" value="1" />
        </label>
      </section>

      <!-- Export -->
      <section class="panel">
        <h2>Export</h2>
        <div class="row2">
          <label class="field">
            <span>Format</span>
            <select id="sel-format">
              <option value="mp4">MP4 (H.264)</option>
              <option value="webm">WebM (VP9)</option>
            </select>
          </label>
          <label class="field">
            <span>Quality</span>
            <select id="sel-quality">
              <option value="1">Standard</option>
              <option value="2">High (2×)</option>
            </select>
          </label>
        </div>
        <div class="field">
          <span>Music <em id="music-name">(none)</em></span>
          <div class="btnrow">
            <button id="btn-music" class="btn btn-ghost small">
              <svg class="ic" viewBox="0 0 24 24"><path d="M9 17.2 V6.2 L19 4 v11.2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="6.8" cy="17.4" r="2.3" fill="currentColor"/><circle cx="16.8" cy="15.4" r="2.3" fill="currentColor"/></svg>
              Add music
            </button>
            <button id="btn-music-clear" class="btn btn-ghost small hidden">
              <svg class="ic" viewBox="0 0 24 24"><path d="M7 7 17 17 M17 7 7 17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              Remove
            </button>
          </div>
        </div>
        <label class="field">
          <span>Watermark <em>(optional, off by default)</em></span>
          <input id="inp-watermark" type="text" placeholder="@yourhandle (leave empty for clean export)" />
        </label>
      </section>
    </div>

    <footer class="side-foot">
      <span>Maps © OpenStreetMap · OpenFreeMap · VersaTiles · CARTO</span>
    </footer>
  </aside>

  <!-- ====================== STAGE ====================== -->
  <main id="stage">
    <button id="nav-toggle" class="nav-toggle" aria-label="Toggle panel">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7 H20 M4 12 H20 M4 17 H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <div id="stage-inner">
      <div id="mapbox">
        <div id="map"></div>
        <canvas id="output" aria-hidden="true"></canvas>
      </div>
    </div>

    <div id="toolbar">
      <button id="btn-play" class="tbtn">
        <svg class="ic" viewBox="0 0 24 24"><path d="M8 5.5 18 12 8 18.5 Z" fill="currentColor"/></svg>
        Preview
      </button>
      <button id="btn-record" class="tbtn rec">
        <svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5.5" fill="currentColor"/><circle cx="12" cy="12" r="8.6" fill="none" stroke="currentColor" stroke-width="1.6" opacity=".55"/></svg>
        Record video
      </button>
      <button id="btn-stop" class="tbtn" disabled>
        <svg class="ic" viewBox="0 0 24 24"><rect x="7" y="7" width="10" height="10" rx="1.5" fill="currentColor"/></svg>
        Stop
      </button>
      <span class="spacer"></span>
      <a id="btn-download" class="tbtn dl hidden" download="triptrail.mp4">
        <svg class="ic" viewBox="0 0 24 24"><path d="M12 4 V14.5 M7.5 10.5 12 15 16.5 10.5" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 19 H19" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/></svg>
        <span id="dl-label">Download video</span>
      </a>
    </div>

    <div id="loading" class="overlay hidden"><div class="spinner"></div><span id="loading-text">Working…</span></div>
    <div id="toast" class="toast hidden"></div>
  </main>

  <div id="scrim"></div>
</div>

<!-- hidden file inputs -->
<input id="file-photo" type="file" accept="image/*" class="hidden" />
<input id="file-route" type="file" accept=".gpx,.kml,.geojson,.json" class="hidden" />
<input id="file-music" type="file" accept="audio/*" class="hidden" />
<audio id="music" loop class="hidden"></audio>

<script src="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.js"></script>
<script src="app.js"></script>
</body>
</html>
